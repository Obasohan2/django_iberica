{% extends "base.html" %}

{% block title %}
  404 - Page Not Found | Iberica News
{% endblock %}

{% block content %}

<div class="container mt-5 text-center">

  <section class="py-5">

    <!-- Page heading -->
    <h1 class="display-4 text-danger">
      404
    </h1>

    <h2 class="mb-3">
      Page Not Found
    </h2>

    <!-- Message -->
    <p class="lead text-muted">
      Sorry, the page you’re looking for doesn’t exist or may have been moved.
    </p>

    <!-- Actions -->
    <div class="mt-4">
      <a href="{% url 'home' %}" class="btn btn-primary mr-2">
        Go to Homepage
      </a>

      <a href="javascript:history.back()" class="btn btn-outline-secondary">
        Go Back
      </a>
    </div>

  </section>

</div>

{% endblock %}
