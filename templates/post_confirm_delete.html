{% extends "base.html" %}

{% block title %}
  Delete Post | Iberica News
{% endblock %}

{% block content %}

<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-8 text-center">

      <!-- Page heading -->
      <h1 class="mb-4 text-danger">
        Delete Post
      </h1>

      <!-- Confirmation message -->
      <p class="lead">
        Are you sure you want to delete this post?
      </p>

      <!-- Post title -->
      <h4 class="mb-4">
        "{{ object.title }}"
      </h4>

      <!-- Delete form -->
      <form method="POST">
        {% csrf_token %}

        <button type="submit" class="btn btn-danger">
          Yes, Delete
        </button>

        <a href="{% url 'post_detail' object.slug %}" class="btn btn-secondary ml-2">
          Cancel
        </a>
      </form>

    </div>
  </div>
</div>

{% endblock %}
